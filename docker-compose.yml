networks:
  proxy_network:
    external: true

services:
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - proxy_network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/ssl:ro
    # Sobe mesmo se ficha_app ainda não existir; qgame precisa estar na mesma rede
    extra_hosts:
      - "host.docker.internal:host-gateway"
