# Redireciona HTTP -> HTTPS
server {
    listen 80;
    server_name 18.231.68.72;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 18.231.68.72;

    ssl_certificate     /etc/ssl/ca.pem;
    ssl_certificate_key /etc/ssl/ca.key;

    client_max_body_size 50m;

    # DNS embutido do Docker (resolve container names em runtime)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # -------------------------------------------------------------------------
    # Django — admin, static e media (API pública passa pelo Next.js)
    # -------------------------------------------------------------------------
    location /admin/ {
        set $qgame_backend http://qgame-backend-prod:8000;
        proxy_pass $qgame_backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        set $qgame_backend http://qgame-backend-prod:8000;
        proxy_pass $qgame_backend/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        set $qgame_backend http://qgame-backend-prod:8000;
        proxy_pass $qgame_backend/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # QGame (Next.js) — app principal
    # -------------------------------------------------------------------------
    location / {
        set $qgame_frontend http://qgame-frontend-prod:3000;
        proxy_pass $qgame_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
